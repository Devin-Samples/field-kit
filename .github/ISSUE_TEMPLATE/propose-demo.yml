name: "Propose an Integration Demo"
description: "Submit a new integration demo to the Field Kit catalog"
title: "[Integration Demo] "
labels: ["demos", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Propose an Integration Demo
        Fill out the fields below to propose a new integration demo for the Field Kit catalog.

  - type: input
    id: title
    attributes:
      label: Demo Title
      description: A clear, descriptive name for this demo
      placeholder: "e.g., AI-Powered Code Review Demo"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What does this demo showcase? Who is the target audience?
      placeholder: "Describe the purpose, scope, and intended audience..."
    validations:
      required: true

  - type: input
    id: maintainer
    attributes:
      label: Maintainer
      description: GitHub username or team responsible
      placeholder: "@username or team-name"
    validations:
      required: true

  - type: dropdown
    id: products
    attributes:
      label: Products
      description: Select one or more products featured in this demo
      multiple: true
      options:
        - Devin
        - Devin for Terminal
        - Windsurf
    validations:
      required: true

  - type: dropdown
    id: demo-level
    attributes:
      label: Demo Level
      description: Optional difficulty/depth level for this demo
      options:
        - "N/A"
        - "101"
        - "201"
    validations:
      required: false

  - type: input
    id: technical-domain
    attributes:
      label: Technical Domain Tags
      description: Comma-separated technical domains
      placeholder: "e.g., Modernization, Security, Testing, DevOps"

  - type: input
    id: language
    attributes:
      label: Language Tags
      description: Comma-separated programming languages
      placeholder: "e.g., Java, Python, TypeScript"

  - type: textarea
    id: guide-resources
    attributes:
      label: "Guide / Resources"
      description: "Links to guides, documentation, or related resources"
      placeholder: |
        - [Resource Name](https://url) - Description (public/protected)

  - type: textarea
    id: additional-notes
    attributes:
      label: Additional Notes
      description: Anything else reviewers should know?
