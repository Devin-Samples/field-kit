name: "Propose a Demo"
description: "Submit a new demo to the Field Kit catalog"
title: "[Demo] "
labels: ["demos", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Propose a Demo
        Fill out the fields below to propose a new demo for the Field Kit catalog.

  - type: input
    id: title
    attributes:
      label: Demo Title
      description: A clear, descriptive name for this demo
      placeholder: "e.g., AI-Powered Code Review Demo"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What does this demo showcase? Who is the target audience?
      placeholder: "Describe the purpose, scope, and intended audience..."
    validations:
      required: true

  - type: input
    id: maintainer
    attributes:
      label: Maintainer
      description: GitHub username or team responsible
      placeholder: "@username or team-name"
    validations:
      required: true

  - type: dropdown
    id: products
    attributes:
      label: Products
      description: Select one or more products featured in this demo
      multiple: true
      options:
        - Devin
        - Devin for Terminal
        - Windsurf
    validations:
      required: true

  - type: dropdown
    id: demo-category
    attributes:
      label: Demo Category
      description: Which demo category does this belong to?
      options:
        - "101"
        - "201"
        - "Integrations"
    validations:
      required: true

  - type: input
    id: content-tags
    attributes:
      label: Content Tags
      description: Comma-separated tags describing this specific demo (used for filtering)
      placeholder: "e.g., Linear, Jira, migration, sprint-automation"
    validations:
      required: true

  - type: input
    id: technical-domain
    attributes:
      label: Technical Domain Tags
      description: Comma-separated technical domains
      placeholder: "e.g., Modernization, Security, Testing, DevOps"

  - type: input
    id: language
    attributes:
      label: Language Tags
      description: Comma-separated programming languages
      placeholder: "e.g., Java, Python, TypeScript"

  - type: textarea
    id: guide-resources
    attributes:
      label: "Guide / Resources"
      description: "Links to guides, documentation, or related resources"
      placeholder: |
        - [Resource Name](https://url) - Description (public/protected)

  - type: textarea
    id: additional-notes
    attributes:
      label: Additional Notes
      description: Anything else reviewers should know?
