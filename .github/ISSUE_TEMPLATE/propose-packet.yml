name: "Propose a Packet"
description: "Propose a new initiative for the Field Kit catalog"
title: "[Packet] "
labels: ["new-packet", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Propose a New Packet
        A packet is an initiative at a specific expertise level, targeting a particular audience.

  - type: input
    id: title
    attributes:
      label: Packet Title
      description: A clear, descriptive name for this initiative
      placeholder: "e.g., Healthcare AI Modernization Toolkit"
    validations:
      required: true

  - type: dropdown
    id: level
    attributes:
      label: Level
      description: |
        100 — Sales & General (overview decks, positioning, introductory material)
        200 — Solutioning & Training (architecture guides, enablement, learning paths)
        300 — Delivery & Usage (hands-on labs, implementation guides, accelerators)
        400 — Expert (troubleshooting, edge-case docs, expert reference)
      options:
        - "100 — Sales & General"
        - "200 — Solutioning & Training"
        - "300 — Delivery & Usage"
        - "400 — Expert"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What does this packet cover? Who is the target audience?
      placeholder: "Describe the purpose, scope, and intended audience..."
    validations:
      required: true

  - type: input
    id: maintainer
    attributes:
      label: Maintainer
      description: GitHub username or team responsible
      placeholder: "@username or team-name"
    validations:
      required: true

  - type: dropdown
    id: discoverability
    attributes:
      label: Discoverability Level
      options:
        - Public
        - Partner
        - Internal
    validations:
      required: true

  - type: dropdown
    id: products
    attributes:
      label: Products
      description: Select one or more products featured
      multiple: true
      options:
        - Devin
        - Devin for Terminal
        - Windsurf
    validations:
      required: true

  - type: input
    id: industry
    attributes:
      label: Industry Tags
      description: Comma-separated industries this targets (leave blank for cross-industry)
      placeholder: "e.g., Healthcare, Financial Services, Retail"

  - type: input
    id: technical-domain
    attributes:
      label: Technical Domain Tags
      description: Comma-separated technical domains
      placeholder: "e.g., Modernization, Security, Testing, DevOps"

  - type: input
    id: language
    attributes:
      label: Language Tags
      description: Comma-separated programming languages
      placeholder: "e.g., Java, Python, TypeScript"

  - type: input
    id: geography
    attributes:
      label: Geography / Region
      description: Target geography if applicable (leave blank for global)
      placeholder: "e.g., North America, EMEA, APAC"

  - type: textarea
    id: resources
    attributes:
      label: "Initial Resources"
      description: "Links to any initial guides, docs, or repos for this packet"
      placeholder: |
        - [Resource Name](https://url) - Description (public/protected)

  - type: textarea
    id: additional-notes
    attributes:
      label: Additional Notes
      description: Anything else reviewers should know?
