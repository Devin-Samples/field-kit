name: Create Packet PR from Issue

on:
  issues:
    types: [opened, labeled]

jobs:
  create-hands-on-lab-pr:
    if: contains(github.event.issue.labels.*.name, 'hands-on-lab')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Parse issue and create packet
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';

            // Parse GitHub Issue Form fields (### Label\n\nValue format)
            function parseField(label) {
              const regex = new RegExp(`### ${label}\\s*\\n\\n([\\s\\S]*?)(?=\\n### |$)`);
              const match = body.match(regex);
              return match ? match[1].trim() : '';
            }

            function parseCSV(label) {
              const val = parseField(label);
              return val ? val.split(',').map(s => s.trim()).filter(Boolean) : [];
            }

            const title = parseField('Lab Title');
            const description = parseField('Description');
            const maintainer = parseField('Maintainer').replace(/^@/, '');
            const discoverability = parseField('Discoverability Level') || 'Internal';
            const contentLabelsRaw = parseField('Content Labels');
            const contentLabels = contentLabelsRaw ? contentLabelsRaw.split(',').map(s => s.trim()).filter(Boolean) : [];
            const workshopsText = parseField('Workshop Templates');
            const modulesText = parseField('Modules / Challenges');

            if (!title) {
              core.setFailed('Could not parse Lab Title from issue body');
              return;
            }

            // Generate kebab-case ID from title
            const id = title.toLowerCase()
              .replace(/[^a-z0-9\s-]/g, '')
              .replace(/\s+/g, '-')
              .replace(/-+/g, '-')
              .replace(/^-|-$/g, '');

            const today = new Date().toISOString().split('T')[0];

            // Build content groups from workshops and modules if provided
            const contentGroups = [];
            const category = [];
            if (workshopsText && workshopsText !== '_No response_') {
              category.push('Workshop');
              contentGroups.push({
                title: 'Workshops',
                description: 'Workshop templates for this lab',
                tags: contentLabels
              });
            }
            if (modulesText && modulesText !== '_No response_') {
              category.push('Modules');
              contentGroups.push({
                title: 'Modules',
                description: 'Challenge modules for this lab',
                tags: contentLabels
              });
            }

            const packet = {
              id: id,
              title: title,
              packetType: 'Hands On Lab',
              issueTemplate: 'propose-hands-on-lab.yml',
              description: description,
              maintainer: maintainer,
              created: today,
              updated: today,
              issueNumber: issue.number,
              publishState: 'Published',
              discoverability: discoverability,
              category: category,
              contentGroups: contentGroups,
              resources: {}
            };

            const fs = require('fs');
            const filename = `${id}.json`;
            const packetPath = `data/packets/${filename}`;

            // Write packet JSON
            fs.writeFileSync(packetPath, JSON.stringify(packet, null, 2) + '\n');

            // Update index.json
            const indexPath = 'data/packets/index.json';
            const index = JSON.parse(fs.readFileSync(indexPath, 'utf8'));
            if (!index.includes(filename)) {
              index.push(filename);
              fs.writeFileSync(indexPath, JSON.stringify(index, null, 2) + '\n');
            }

            // Export for later steps
            core.exportVariable('PACKET_FILENAME', filename);
            core.exportVariable('PACKET_TITLE', title);
            core.exportVariable('PACKET_ID', id);
            core.exportVariable('ISSUE_NUMBER', issue.number.toString());

      - name: Create pull request
        run: |
          BRANCH="packet/${PACKET_ID}-from-issue-${ISSUE_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data/packets/
          git commit -m "feat: add packet '${PACKET_TITLE}' from issue #${ISSUE_NUMBER}"
          git push origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Open PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Add packet: ${process.env.PACKET_TITLE}`,
              head: process.env.BRANCH,
              base: 'main',
              body: `Adds the **${process.env.PACKET_TITLE}** packet to the Field Kit catalog.\n\nCreated from issue #${process.env.ISSUE_NUMBER}.\n\nFile: \`data/packets/${process.env.PACKET_FILENAME}\``
            });
            core.exportVariable('PR_NUMBER', pr.number.toString());
            core.exportVariable('PR_URL', pr.html_url);

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.ISSUE_NUMBER),
              body: `A pull request has been created to add **${process.env.PACKET_TITLE}** to the catalog.\n\nReview and merge to publish: ${process.env.PR_URL}\n\nFile: \`data/packets/${process.env.PACKET_FILENAME}\``
            });

      - name: Add label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.ISSUE_NUMBER),
              labels: ['pr-created']
            });

  create-demo-pr:
    if: contains(github.event.issue.labels.*.name, 'demos')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Parse issue and update packet
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';

            // Parse GitHub Issue Form fields (### Label\n\nValue format)
            function parseField(label) {
              const regex = new RegExp(`### ${label}\\s*\\n\\n([\\s\\S]*?)(?=\\n### |$)`);
              const match = body.match(regex);
              return match ? match[1].trim() : '';
            }

            const title = parseField('Demo Title');
            const description = parseField('Description');
            const demoCategory = parseField('Demo Category');
            const contentLabelsRaw = parseField('Content Labels');
            const contentLabels = contentLabelsRaw ? contentLabelsRaw.split(',').map(s => s.trim()).filter(Boolean) : [];
            const guideResources = parseField('Guide / Resources');

            if (!title) {
              core.setFailed('Could not parse Demo Title from issue body');
              return;
            }

            // Map demo category to packet file
            const categoryMap = {
              '101': '101-demos.json',
              '201': '201-demos.json',
              'Integrations': 'integration-demos.json'
            };
            const packetFile = categoryMap[demoCategory] || 'integration-demos.json';

            // Parse markdown links from Guide / Resources field
            const linkRegex = /\[([^\]]+)\]\(([^)]+)\)/g;
            const links = [];
            let m;
            while ((m = linkRegex.exec(guideResources)) !== null) {
              links.push({ label: m[1].trim(), url: m[2].trim() });
            }

            // Infer resource type from URL
            function inferType(url) {
              if (url.includes('devin.ai/sessions') || url.includes('app.devin.ai')) return 'devin-session';
              if (url.includes('notion.so')) return 'notion';
              if (url.includes('loom.com') || url.includes('youtube.com') || url.includes('youtu.be') || url.includes('vimeo.com')) return 'video';
              if (url.includes('docs.google.com')) return 'google-doc';
              if (url.includes('github.com')) return 'github-repo';
              return 'other';
            }

            // Build content group for this demo
            const contentGroup = {
              title: title,
              description: description,
              tags: contentLabels,
              items: links.map(link => ({
                title: link.label,
                url: link.url,
                type: inferType(link.url)
              }))
            };

            // Read and update the target packet
            const fs = require('fs');
            const packetPath = `data/packets/${packetFile}`;
            const packet = JSON.parse(fs.readFileSync(packetPath, 'utf8'));

            if (!packet.contentGroups) packet.contentGroups = [];
            packet.contentGroups.push(contentGroup);

            const today = new Date().toISOString().split('T')[0];
            packet.updated = today;

            fs.writeFileSync(packetPath, JSON.stringify(packet, null, 2) + '\n');

            // Generate kebab-case ID from title for branch name
            const id = title.toLowerCase()
              .replace(/[^a-z0-9\s-]/g, '')
              .replace(/\s+/g, '-')
              .replace(/-+/g, '-')
              .replace(/^-|-$/g, '');

            // Export for later steps
            core.exportVariable('PACKET_FILENAME', packetFile);
            core.exportVariable('PACKET_NAME', packet.title);
            core.exportVariable('PACKET_TITLE', title);
            core.exportVariable('PACKET_ID', id);
            core.exportVariable('ISSUE_NUMBER', issue.number.toString());

      - name: Create pull request
        run: |
          BRANCH="packet/${PACKET_ID}-from-issue-${ISSUE_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data/packets/
          git commit -m "feat: add demo '${PACKET_TITLE}' from issue #${ISSUE_NUMBER}"
          git push origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Open PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Add demo: ${process.env.PACKET_TITLE}`,
              head: process.env.BRANCH,
              base: 'main',
              body: `Adds the **${process.env.PACKET_TITLE}** demo to the **${process.env.PACKET_NAME}** packet.\n\nCreated from issue #${process.env.ISSUE_NUMBER}.\n\nFile: \`data/packets/${process.env.PACKET_FILENAME}\``
            });
            core.exportVariable('PR_NUMBER', pr.number.toString());
            core.exportVariable('PR_URL', pr.html_url);

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.ISSUE_NUMBER),
              body: `A pull request has been created to add **${process.env.PACKET_TITLE}** to the catalog.\n\nReview and merge to publish: ${process.env.PR_URL}\n\nFile: \`data/packets/${process.env.PACKET_FILENAME}\``
            });

      - name: Add label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.ISSUE_NUMBER),
              labels: ['pr-created']
            });
