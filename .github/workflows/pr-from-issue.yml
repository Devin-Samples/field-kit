name: Create PR from Issue

on:
  issues:
    types: [opened, labeled]

jobs:
  create-packet-pr:
    if: contains(github.event.issue.labels.*.name, 'new-packet')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Parse issue and create packet
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';

            function parseField(label) {
              const regex = new RegExp(`### ${label}\\s*\\n\\n([\\s\\S]*?)(?=\\n### |$)`);
              const match = body.match(regex);
              return match ? match[1].trim() : '';
            }

            function parseCSV(label) {
              const val = parseField(label);
              return val ? val.split(',').map(s => s.trim()).filter(Boolean) : [];
            }

            const title = parseField('Packet Title');
            const level = parseField('Level');
            const description = parseField('Description');
            const maintainer = parseField('Maintainer').replace(/^@/, '');
            const discoverability = parseField('Discoverability Level') || 'Internal';
            const products = parseField('Products');
            const industry = parseCSV('Industry Tags');
            const technicalDomain = parseCSV('Technical Domain Tags');
            const language = parseCSV('Language Tags');
            const geography = parseField('Geography / Region');

            if (!title) {
              core.setFailed('Could not parse Packet Title from issue body');
              return;
            }

            if (!level) {
              core.setFailed('Could not parse Level from issue body');
              return;
            }

            const id = title.toLowerCase()
              .replace(/[^a-z0-9\s-]/g, '')
              .replace(/\s+/g, '-')
              .replace(/-+/g, '-')
              .replace(/^-|-$/g, '');

            const today = new Date().toISOString().split('T')[0];

            const productList = products
              ? products.split(',').map(s => s.trim()).filter(Boolean)
              : [];

            const customTags = [];
            if (geography) customTags.push(geography);

            const packet = {
              id: id,
              title: title,
              packetType: level,
              issueTemplate: 'propose-content.yml',
              description: description,
              maintainer: maintainer,
              created: today,
              updated: today,
              issueNumber: issue.number,
              publishState: 'Published',
              discoverability: discoverability,
              tags: {
                industry: industry.length > 0 ? industry : ['Cross-Industry'],
                productLine: productList.length > 0 ? productList : ['Devin'],
                technicalDomain: technicalDomain,
                language: language,
                custom: customTags
              },
              contentGroups: [],
              resources: {}
            };

            const fs = require('fs');
            const filename = `${id}.json`;
            const packetPath = `data/packets/${filename}`;

            fs.writeFileSync(packetPath, JSON.stringify(packet, null, 2) + '\n');

            const indexPath = 'data/packets/index.json';
            const index = JSON.parse(fs.readFileSync(indexPath, 'utf8'));
            if (!index.includes(filename)) {
              index.push(filename);
              fs.writeFileSync(indexPath, JSON.stringify(index, null, 2) + '\n');
            }

            core.exportVariable('PACKET_FILENAME', filename);
            core.exportVariable('PACKET_TITLE', title);
            core.exportVariable('PACKET_ID', id);
            core.exportVariable('ISSUE_NUMBER', issue.number.toString());

      - name: Create pull request
        run: |
          BRANCH="packet/${PACKET_ID}-from-issue-${ISSUE_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data/packets/
          git commit -m "feat: add packet '${PACKET_TITLE}' from issue #${ISSUE_NUMBER}"
          git push origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Open PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Add packet: ${process.env.PACKET_TITLE}`,
              head: process.env.BRANCH,
              base: 'main',
              body: `Adds the **${process.env.PACKET_TITLE}** packet to the Field Kit catalog.\n\nCreated from issue #${process.env.ISSUE_NUMBER}.\n\nFile: \`data/packets/${process.env.PACKET_FILENAME}\``
            });
            core.exportVariable('PR_NUMBER', pr.number.toString());
            core.exportVariable('PR_URL', pr.html_url);

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.ISSUE_NUMBER),
              body: `A pull request has been created to add **${process.env.PACKET_TITLE}** to the catalog.\n\nReview and merge to publish: ${process.env.PR_URL}\n\nFile: \`data/packets/${process.env.PACKET_FILENAME}\``
            });

      - name: Add label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.ISSUE_NUMBER),
              labels: ['pr-created']
            });

  add-content-pr:
    if: contains(github.event.issue.labels.*.name, 'new-content')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Parse issue and update packet
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';

            function parseField(label) {
              const regex = new RegExp(`### ${label}\\s*\\n\\n([\\s\\S]*?)(?=\\n### |$)`);
              const match = body.match(regex);
              return match ? match[1].trim() : '';
            }

            const packetId = parseField('Target Packet ID');
            const contentTitle = parseField('Content Title');
            const contentDescription = parseField('Description');
            const contentType = parseField('Content Type');
            const contentUrl = parseField('URL');
            const resourceSection = parseField('Resource Section');
            const access = parseField('Access Level') || 'public';

            if (!packetId) {
              core.setFailed('Could not parse Target Packet ID from issue body');
              return;
            }
            if (!contentTitle) {
              core.setFailed('Could not parse Content Title from issue body');
              return;
            }

            const fs = require('fs');
            const packetPath = `data/packets/${packetId}.json`;

            if (!fs.existsSync(packetPath)) {
              core.setFailed(`Packet file not found: ${packetPath}`);
              return;
            }

            const packet = JSON.parse(fs.readFileSync(packetPath, 'utf8'));

            const resource = {
              title: contentTitle,
              type: contentType || 'other',
              url: contentUrl || '',
              description: contentDescription || '',
              access: access
            };

            if (!packet.resources) packet.resources = {};

            let sectionKey;
            if (resourceSection === 'Lab Package — Cognition Env') {
              if (!packet.resources.labPackage) packet.resources.labPackage = {};
              if (!packet.resources.labPackage.cognitionEnv) packet.resources.labPackage.cognitionEnv = [];
              packet.resources.labPackage.cognitionEnv.push(resource);
              sectionKey = 'labPackage.cognitionEnv';
            } else if (resourceSection === 'Lab Package — Customer Env') {
              if (!packet.resources.labPackage) packet.resources.labPackage = {};
              if (!packet.resources.labPackage.customerEnv) packet.resources.labPackage.customerEnv = [];
              packet.resources.labPackage.customerEnv.push(resource);
              sectionKey = 'labPackage.customerEnv';
            } else if (resourceSection === 'Media') {
              if (!packet.resources.media) packet.resources.media = [];
              packet.resources.media.push(resource);
              sectionKey = 'media';
            } else {
              if (!packet.resources.setupGuide) packet.resources.setupGuide = [];
              packet.resources.setupGuide.push(resource);
              sectionKey = 'setupGuide';
            }

            const today = new Date().toISOString().split('T')[0];
            packet.updated = today;

            fs.writeFileSync(packetPath, JSON.stringify(packet, null, 2) + '\n');

            core.exportVariable('PACKET_ID', packetId);
            core.exportVariable('PACKET_TITLE', packet.title);
            core.exportVariable('CONTENT_TITLE', contentTitle);
            core.exportVariable('ISSUE_NUMBER', issue.number.toString());

      - name: Create pull request
        run: |
          BRANCH="content/${PACKET_ID}-${ISSUE_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data/packets/
          git commit -m "feat: add '${CONTENT_TITLE}' to packet '${PACKET_TITLE}' from issue #${ISSUE_NUMBER}"
          git push origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Open PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Add content to ${process.env.PACKET_TITLE}: ${process.env.CONTENT_TITLE}`,
              head: process.env.BRANCH,
              base: 'main',
              body: `Adds **${process.env.CONTENT_TITLE}** to the **${process.env.PACKET_TITLE}** packet.\n\nCreated from issue #${process.env.ISSUE_NUMBER}.\n\nFile: \`data/packets/${process.env.PACKET_ID}.json\``
            });
            core.exportVariable('PR_NUMBER', pr.number.toString());
            core.exportVariable('PR_URL', pr.html_url);

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.ISSUE_NUMBER),
              body: `A pull request has been created to add **${process.env.CONTENT_TITLE}** to the **${process.env.PACKET_TITLE}** packet.\n\nReview and merge to publish: ${process.env.PR_URL}`
            });

      - name: Add label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.ISSUE_NUMBER),
              labels: ['pr-created']
            });
