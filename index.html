<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Field Kit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F9F0;</text></svg>">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="site-brand">
        <img class="site-logo-img" src="assets/images/devin-logo-black.png" alt="Devin" height="28">
        <span class="site-divider"></span>
        <span class="site-title">Field Kit</span>
        <span class="site-divider"></span>
        <span class="site-subtitle">Asset catalog for sales, enablement &amp; delivery</span>
      </div>
      <div class="header-actions">
        <a href="https://github.com/Devin-Samples/field-kit/issues/new?template=propose-packet.yml" class="btn btn-primary" target="_blank" rel="noopener">+ Propose Packet</a>
        <a href="https://github.com/Devin-Samples/field-kit" class="btn btn-outline" target="_blank" rel="noopener">Repository</a>
      </div>
    </div>
  </header>

  <div class="toolbar">
    <div class="search-bar">
      <span class="search-icon">&#x1F50D;</span>
      <input type="text" id="search-input" placeholder="Search packets by title, description, tags, or type..." autocomplete="off">
    </div>
    <div class="filter-row">
      <div class="filter-group">
        <label for="filter-state">State</label>
        <select id="filter-state">
          <option value="">All States</option>
          <option value="Published">Published</option>
          <option value="Archived">Archived</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="filter-discoverability">Access</label>
        <select id="filter-discoverability">
          <option value="">All Levels</option>
          <option value="Public">Public</option>
          <option value="Partner">Partner</option>
          <option value="Internal">Internal</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="filter-type">Level</label>
        <select id="filter-type">
          <option value="">All Expertise Levels</option>
        </select>
      </div>
    </div>
    <div id="active-filters" class="active-filters"></div>
    <div id="results-summary" class="results-summary"></div>
  </div>

  <main class="content-area">
    <aside class="sidebar">
      <div class="sidebar-section">
        <h3>Level</h3>
        <ul id="sidebar-type" class="sidebar-list"></ul>
      </div>
      <div class="sidebar-section">
        <h3>Industry</h3>
        <ul id="sidebar-industry" class="sidebar-list"></ul>
      </div>
      <div class="sidebar-section">
        <h3>Technical Domain</h3>
        <ul id="sidebar-domain" class="sidebar-list"></ul>
      </div>
      <div class="sidebar-section">
        <h3>All Tags</h3>
        <div id="tag-cloud" class="tag-cloud"></div>
      </div>
    </aside>

    <section id="packet-grid" class="packet-grid"></section>
  </main>

  <div id="modal-overlay" class="modal-overlay">
    <div class="modal" id="modal-content"></div>
  </div>

  <footer class="site-footer">
    <p>Field Kit &mdash; <a href="https://devin.ai" target="_blank">Powered by Devin</a></p>
  </footer>

  <script src="assets/js/app.js"></script>
</body>
</html>
